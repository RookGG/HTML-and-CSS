<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="registration101.css">
        <title>Registration Form</title>
    </head>
    <body>
        <h1>Registration Form</h1>
        <p>Please fill out this form with the required information.</p>

        <form method="post" action="/registration">
            <fieldset>
                <label for="first-name">First Name : 
                    <input id="first-name" name="first-name" type="text" required />
                </label>

                <label for="last-name">Last Name :
                    <input id="last-name" name="last-name" type="text" required />
                </label>

                <label for="email">Email : 
                    <input id="email" name="email" type="email" required />
                </label>

                <label for="password">Create a New Password :
                    <input id="new-password" name="new-password" type="password" pattern="[a-z0-5]{8,}" required />
                </label>
            </fieldset>

            <fieldset>
                <legend>Account type (required)</legend>
                <label for="personal-account">
                    <input id="personal-account" type="radio" name="account-type" value="personal" class="inline" checked /> Personal
                </label>

                <label for="business-account">
                    <input id="business-account" type="radio" name="account-type" value="business" class="inline" /> Business
                </label>
            </fieldset>

            <fieldset>
                <label for="profile-picture">Upload a Profile Picture : 
                    <input id="profile-picture" name="file" type="file" />
                </label>

                <label for="age">Enter Your Age :
                    <input id="age" name="age" type="number" min="15" max="100" />
                </label>

                <label for="referrer">How did you hear about us? 
                    <select id="referrer" name="referrer">
                        <option value="">(select one)</option>
                        <option value="1">News Outlet</option>
                        <option value="2">Social Media</option>
                        <option value="3">Friends or Family Members</option>
                        <option value="4">Other</option>
                    </select>    
                </label>

                <label for="bio" >Provide a Bio :
                    <textarea id="bio" name="bio" rows="3" cols="30" placeholder=""></textarea>
                </label>
            </fieldset>

            <a href="termandcondition.html">Read our terms and condition</a>
            <label for="term-and-condition">
                <input id="term-and-condition" name="terms" type="checkbox" required />I accept the terms and conditions.
            </label>
            <input type="submit" value="Submit" />
        </form>
    </body>
</html>
